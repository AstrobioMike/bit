{% set data = load_file_data("../pyproject.toml", from_recipe_dir=True) %}

# python version is overridable at build time via a conda-build variant
# (e.g. `conda build conda-recipe --variants "{python_version: ['3.12']}"`).
# defaults to 3.10 when no variant is passed, so normal builds are unchanged.
{% set python_version = python_version or "3.10" %}

package:
  name: "{{ data.get('project', {}).get('name')|lower }}"
  version: "{{ data.get('project', {}).get('version') }}"

source:
  path: ../

build:
  number: 0

requirements:
  host:
    - python={{ python_version }}
    - pip
    - setuptools>=61.0
    - wheel

  run:
    - argcomplete=3.6
    - biopython
    - blast=2
    - bwa>=0.7
    - coreutils
    - diamond=2.1.16
    - edlib=1.3
    - entrez-direct
    - goatools
    - mamba=1
    - matplotlib=3.10
    - miniprot=0.18
    - mosdepth
    - numpy=1.26.4
    - pandas
    - parallel
    - pigz
    - pip
    - pulp=2.7.0
    - pybedtools
    - pyfastx
    - pytest
    - pytest-cov
    - python={{ python_version }}
    - rich
    - rich-argparse=1.7.1
    - samtools
    - scikit-bio
    - snakemake=7.26.0
    - taxonkit>=0.20.0
    - tqdm>=4.66.5
    - unzip
    - zip


test:
  commands:
    bit -v

about:
  home: https://github.com/AstrobioMike/bit
  license: GPL3
  summary: A set of bioinformatics tools and workflows I use regularly enough to want to have accessible from anywhere.
