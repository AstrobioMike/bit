name: refresh-ncbi-assembly-info

# Weekly rebuild of bit's slim NCBI assembly-info table.
#
# Downloads the GenBank + RefSeq assembly_summary tables, slims them to the columns bit uses,
# gzips the result, and overwrites a single fixed asset on a dedicated release so
# the download URL never changes.
#
# The asset URL bit fetches:
#   https://github.com/AstrobioMike/bit/releases/download/ncbi-assembly-info-latest/ncbi-assembly-info.tsv.gz
#
# Before enabling: create the release/tag named by RELEASE_TAG below (it can hold
# only this one asset). The schedule plus workflow_dispatch lets you also trigger
# a manual run to inspect the produced asset before trusting the weekly cron.

on:
  schedule:
    # 06:00 UTC every Monday
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-ncbi-assembly-info
  cancel-in-progress: false

env:
  RELEASE_TAG: ncbi-assembly-info-latest
  ASSET_NAME: ncbi-assembly-info.tar.gz

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build slim NCBI assembly-info bundle
        run: |
          python -m bit.modules.ncbi.slim_ncbi_assembly_summary \
            --out-dir build --archive-name "${ASSET_NAME}"
          ls -l build

      - name: Sanity-check the built asset
        run: |
          set -euo pipefail
          tgz="build/${ASSET_NAME}"
          test -s "$tgz"
          gzip -t "$tgz"

          # extracting to check the files
          work=$(mktemp -d)
          tar -xzf "$tgz" -C "$work"

          # checking expected files present
          members=$(cd "$work" && ls | sort | tr '\n' ' ')
          echo "members: $members"
          test "$members" = "date-retrieved.txt ncbi-assembly-info.tsv "

          # checking header
          header=$(head -1 "$work/ncbi-assembly-info.tsv")
          echo "header: $header"
          case "$header" in
            assembly_accession*) : ;;
            *) echo "unexpected header"; exit 1 ;;
          esac

          # checking for a reasonable amount of lines to minimally guard against a truncated build
          rows=$(wc -l < "$work/ncbi-assembly-info.tsv")
          echo "rows (incl header): $rows"
          test "$rows" -gt 1000000

          # checking date-retrieved.txt is a valid date string
          datestr=$(head -1 "$work/date-retrieved.txt")
          echo "date-retrieved: $datestr"
          echo "$datestr" | grep -Eq '^[0-9]{4},[0-9]{2},[0-9]{2}$'

          rm -rf "$work"

      - name: Upload / overwrite the release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_TAG" "build/${ASSET_NAME}" \
            --clobber --repo "${{ github.repository }}"
