name: check-gtdb-metadata

# Weekly version-gated refresh of bit's slim GTDB metadata asset.
#
# GTDB only releases ~twice a year, so this checks cheaply each week and rebuilds
# only when upstream actually advances:
#   1. fetch upstream GTDB VERSION.txt
#   2. fetch the version currently published as a small loose asset on our release
#   3. if they match -> stop (no big download, no rebuild, no upload)
#   4. if they differ -> download + slim the full GTDB metadata, package the
#      tarball, and clobber both assets (the tarball + the loose version file)

on:
  schedule:
    # 07:00 UTC every Monday
    - cron: "0 7 * * 1"
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Rebuild even if the version is unchanged"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: check-gtdb-metadata
  cancel-in-progress: false

env:
  RELEASE_TAG: gtdb-metadata
  ASSET_NAME: GTDB-arc-and-bac-metadata.tar.gz
  VERSION_ASSET_NAME: GTDB-version-info.txt
  GTDB_VERSION_URL: https://data.ace.uq.edu.au/public/gtdb/data/releases/latest/VERSION.txt

jobs:
  check-and-refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Determine whether a rebuild is needed
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # upstream version
          curl -fsSL "$GTDB_VERSION_URL" -o upstream-version.txt
          echo "----- upstream VERSION.txt -----"
          cat upstream-version.txt

          # currently published version asset
          published=""
          if gh release download "$RELEASE_TAG" --repo "${{ github.repository }}" \
               --pattern "$VERSION_ASSET_NAME" --dir published 2>/dev/null; then
            published="published/${VERSION_ASSET_NAME}"
            echo "----- published GTDB-version-info.txt -----"
            cat "$published"
          else
            echo "No published version asset found."
          fi

          # normalize (strip leading/trailing whitespace per line + blank lines)
          norm() { sed -e 's/[[:space:]]*$//' -e '/^$/d' "$1" | tr -d '\r'; }

          need_rebuild=true
          if [ -n "$published" ] && diff -q <(norm upstream-version.txt) <(norm "$published") >/dev/null; then
            need_rebuild=false
          fi

          # manual override
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && \
             [ "${{ inputs.force_rebuild }}" = "true" ]; then
            echo "force_rebuild requested -> rebuilding regardless"
            need_rebuild=true
          fi

          echo "need_rebuild=$need_rebuild" >> "$GITHUB_OUTPUT"
          echo "Decision: need_rebuild=$need_rebuild"

      - name: Build slim GTDB bundle
        if: steps.decide.outputs.need_rebuild == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install pandas
          python -m bit.modules.gtdb.get_gtdb_data \
            --out-dir build --archive-name "${ASSET_NAME}"
          ls -l build

      - name: Sanity-check the built asset
        if: steps.decide.outputs.need_rebuild == 'true'
        run: |
          set -euo pipefail
          tgz="build/${ASSET_NAME}"
          test -s "$tgz"
          gzip -t "$tgz"

          # extracting files to check
          work=$(mktemp -d)
          tar -xzf "$tgz" -C "$work"

          # checking expected files present
          members=$(cd "$work" && ls | sort | tr '\n' ' ')
          echo "members: $members"
          test "$members" = "GTDB-arc-and-bac-metadata.tsv GTDB-version-info.txt "

          # checking header
          header=$(head -1 "$work/GTDB-arc-and-bac-metadata.tsv")
          echo "header: $header"
          case "$header" in
            accession*) : ;;
            *) echo "unexpected header"; exit 1 ;;
          esac

          # minimal guard against a truncated build
          rows=$(wc -l < "$work/GTDB-arc-and-bac-metadata.tsv")
          echo "rows (incl header): $rows"
          test "$rows" -gt 500000

          # making sure the bundled version file is non-empty
          test -s "$work/GTDB-version-info.txt"

          # main() also leaves GTDB-version-info.txt loose in build/ (in addition
          # to bundling it in the tarball above). that copy is what we
          # upload as the separate small asset for the weekly version check
          # checking on that here
          test -s "build/${VERSION_ASSET_NAME}"
          cmp "build/${VERSION_ASSET_NAME}" "$work/GTDB-version-info.txt"
          rm -rf "$work"

      - name: Upload / overwrite the release assets
        if: steps.decide.outputs.need_rebuild == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_TAG" \
            "build/${ASSET_NAME}" "build/${VERSION_ASSET_NAME}" \
            --clobber --repo "${{ github.repository }}"

      - name: No update needed
        if: steps.decide.outputs.need_rebuild != 'true'
        run: echo "GTDB version unchanged; nothing to do."
