name: build-and-test

on:
  push:
  pull_request:

jobs:
  build-and-test:
    if: ${{ !contains(github.event.head_commit.message, '[skip-ci]') }}

    strategy:
      # don't let a failing 3.11/3.12 job cancel the still-useful 3.10 jobs
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macos-latest"]
        python-version: ["3.10", "3.11", "3.12"]
        # marking which versions are required (block) vs informational (continue-on-error)
        # to promote 3.11 or 3.12 to required later, i'll flip their `required` to true
        include:
          - python-version: "3.10"
            required: true
          - python-version: "3.11"
            required: false
          - python-version: "3.12"
            required: false
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        python-version: ${{ matrix.python-version }}
        architecture: "x86_64"
        auto-activate-base: true
        channels: conda-forge,bioconda
        channel-priority: strict
        auto-update-conda: true

    - name: Build conda package
      # override the recipe's python pin for this matrix leg via a build variant.
      # the recipe defaults to 3.10 when no variant is passed, so local/other builds
      # are unaffected (see conda-recipe/meta.yaml)
      run: |
        conda install -n base conda-build -y
        conda build conda-recipe \
          --variants "{python_version: ['${{ matrix.python-version }}']}" \
          --output-folder build_artifacts

    - name: Create conda env
      run: conda create -n bit -y

    - name: Add local area as channel
      run: conda run -n bit conda config --add channels file://${PWD}/build_artifacts

    - name: Install package
      run: |
        conda run -n bit conda install bit -y
        conda run -n bit pip install -e . # the editable pip install is so test coverages make sense

    - name: Check installed version
      run: conda run -n bit bit -v

    - name: Set env var so subprocesses get coverage during pytest
      run: echo "COVERAGE_PROCESS_START=.coveragerc" >> $GITHUB_ENV

    - name: Run pytest
      # 3.11/3.12 are informational for now, a failure here is logged but does
      # not fail the job. i need to flip the version's `required` to true above to gate on it
      continue-on-error: ${{ !matrix.required }}
      run: conda run -n bit pytest
